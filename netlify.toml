# Netlify build tooling only. Application secrets and feature flags live in
# Netlify Environment variables (import from `.env.netlify.example`).
# This repository is public — never commit filled env files.

[build]
  command = "pnpm build"

[build.environment]
  NODE_VERSION = "24"

# Next.js on Netlify is handled by the official Next.js Runtime.
# Do not set a static publish directory here.
