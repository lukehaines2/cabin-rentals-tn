services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: deep
      POSTGRES_USER: deep
      POSTGRES_PASSWORD: deep-local-only
    ports:
      - '5432:5432'
    volumes:
      - deep-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U deep -d deep']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  deep-postgres-data:
